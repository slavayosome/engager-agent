name: release

# Publish engager-agent to npm on a version tag (e.g. v0.1.2).
# Bump package.json to the matching version before tagging.
# Requires npm Trusted Publishing to authorize this repository/workflow.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Exact release tag, for example v0.9.0"
        required: true

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.18.0
      - run: test "$(npm --version)" = "11.18.0"
      - run: npm ci
      - run: npm run release:check-tag -- "$RELEASE_TAG"
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run audit:dependencies
      - run: npm run release:pack
      - run: npm run test:package
      - run: npm run release:verify-artifact
      - run: git diff --exit-code -- bundle THIRD_PARTY_NOTICES
      - run: npm run release:publish-artifact
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
